# https://alacritty.org/config-alacritty.html

[env]
term = "xterm-256color"

[font]
size = 18

[font.normal]
# family = "Menlo" # Alacritty default on macOS
family = "Hack Nerd Font"

[window]
# decorations = "Full" | "None" | "Transparent" | "Buttonless"
decorations = "Buttonless"
startup_mode = "Maximized"
dynamic_title = true

[window.padding]
x = 10
y = 10

[mouse]
hide_when_typing = true

# Tokyo Night Moon Alacritty Colors
## upstream: https://github.com/folke/tokyonight.nvim/raw/main/extras/alacritty/tokyonight_moon.toml

[colors.primary]
background = "#222436"
foreground = "#c8d3f5"

[colors.normal]
black = "#1b1d2b"
red = "#ff757f"
green = "#c3e88d"
yellow = "#ffc777"
blue = "#82aaff"
magenta = "#c099ff"
cyan = "#86e1fc"
white = "#828bb8"

[colors.bright]
black = "#444a73"
red = "#ff8d94"
green = "#c7fb6d"
yellow = "#ffd8ab"
blue = "#9ab8ff"
magenta = "#caabff"
cyan = "#b2ebff"
white = "#c8d3f5"
