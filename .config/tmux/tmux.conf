# Dynamically set the tmux prefix based on SSH connection.
if-shell '[ -n "$SSH_CONNECTION" ]' \
  'set-option -g prefix C-a; unbind-key C-b; bind-key C-a send-prefix' \
  'set-option -g prefix C-b'

# Make mouse useful in copy mode
set -g mouse on
# Enable vi-keybinds in copy mode
setw -g mode-keys vi
# Copy-mode yanks go to the system clipboard
set -g set-clipboard on
# Scroll History
set -g history-limit 30000
# Set ability to capture on start and restore on exit window data when running an application
set -g alternate-screen on
# Lower escape timing from 500ms to 50ms for quicker response to scroll-buffer access.
set -s escape-time 50

# hjkl pane traversal
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Aerospace-style smart pane resizing with +/- like window manager
set -g @pane_resize_step 10
unbind +
unbind _
bind -r + run-shell "sh -c 'if [ #{pane_at_right} -eq 0 ]; then tmux resize-pane -R #{@pane_resize_step}; elif [ #{pane_at_left} -eq 0 ]; then tmux resize-pane -L #{@pane_resize_step}; elif [ #{pane_at_bottom} -eq 0 ]; then tmux resize-pane -D #{@pane_resize_step}; elif [ #{pane_at_top} -eq 0 ]; then tmux resize-pane -U #{@pane_resize_step}; fi'"
bind -r _ run-shell "sh -c 'if [ #{pane_at_right} -eq 0 ]; then tmux resize-pane -L #{@pane_resize_step}; elif [ #{pane_at_left} -eq 0 ]; then tmux resize-pane -R #{@pane_resize_step}; elif [ #{pane_at_bottom} -eq 0 ]; then tmux resize-pane -U #{@pane_resize_step}; elif [ #{pane_at_top} -eq 0 ]; then tmux resize-pane -D #{@pane_resize_step}; fi'"

# <leader>+Tab to toggle previous window
bind-key Tab last-window

# Open panes in current directory (https://www.youtube.com/watch?v=DzNmUNvnB04)
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Stable terminal contract for local, SSH, and nested tmux sessions.
# Everything inside tmux should see the same TERM, regardless of the outer emulator.
set -g default-terminal "tmux-256color"

# Prefer tmux feature flags over raw escape-code overrides.
# Many modern terminals still report xterm-256color even when they support RGB.
# Advertising RGB for those clients keeps colours correct in direct and nested tmux sessions.
# Styled underlines are optional polish, so leave them to terminfo instead of forcing escape codes here.
set -g terminal-features "xterm-256color:RGB,tmux-256color:RGB"

# Refresh a small, explicit set of client-provided variables on attach.
# - display/session context: DISPLAY, WINDOWID, XAUTHORITY
# - auth/agent context: KRB5CCNAME, SSH_ASKPASS, SSH_AUTH_SOCK, SSH_AGENT_PID, SSH_CONNECTION
# - platform-specific context: MSYSTEM
# - outer terminal marker: DOTFILES_TERM
set -g update-environment \
  "DISPLAY KRB5CCNAME MSYSTEM SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY DOTFILES_TERM"

# Keep the status line structure, but let terminal defaults supply most colours.
set -g status-position top
set -g status-style bg=default
set -g status-left ''
set -g status-right ''
set -g status-justify centre
setw -g window-status-current-style bold
setw -g window-status-current-format ' ● #I:#W'
setw -g window-status-style none
setw -g window-status-format ' ○ #I:#{b:pane_current_path}'
setw -g window-status-bell-style bold

# Automatically rename each window from its active pane as leaf-dir:process, capped to 25 chars
# #{?CONDITION,TRUE_VALUE,FALSE_VALUE}
# #{?#{||:CONDITION1,CONDITION2},IF_TRUE,IF_FALSE}
set -g allow-rename on
set -g automatic-rename on
set -g automatic-rename-format '#{=25:#{b:pane_current_path}:#{pane_current_command}}'

# Reload Tmux configuration (press <ctrl+b> r to resource tmux)
bind-key -r r source-file ~/.config/tmux/tmux.conf
